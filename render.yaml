services:
  - type: web
    name: telegram-chess-arena
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
      - key: DATABASE_PATH
        value: /var/data/chess.json
      - key: BOT_TOKEN
        sync: false
      - key: PUBLIC_URL
        sync: false
    disk:
      name: chess-data
      mountPath: /var/data
      sizeGB: 1
